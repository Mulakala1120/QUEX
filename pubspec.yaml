name: quex
description: QueX - Skip the wait. Join the queue from anywhere.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  firebase_messaging: ^15.1.6
  http: ^1.2.2
  equatable: ^2.0.7
  pinput: ^5.0.0
  qr_flutter: ^4.1.0
  intl: ^0.19.0
  shared_preferences: ^2.3.3
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
